<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/styles/globals.css">
    <script src="script.js"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

<body onload="initTheme(); onload()" class="p-12">

                <h3 class="text-2xl my-4">Text</h3>
                <p id="01_vocals">...</p>

            <div class="rounded-xl bg-[var(--accent)]/30 p-5 border border-[var(--border)]">

                <p id="02_01_mostra_info">...</p>

                <h3 class="text-2xl my-4">Triangle</h3>
                <p id="02_04_mostra_info">...</p>
            </div>

            <div class="rounded-xl bg-[var(--accent)]/30 p-5 border border-[var(--border)]">

                <h3 class="text-2xl my-4">Persona</h3>
                <p id="03_01_mostra_dades">...</p>
                <h3 class="text-2xl my-4">Professor</h3>

                <p id="03_04_mostra_dades">...</p>
                <h3 class="text-2xl my-4">Llista Professors</h3>
                <p id="03_05_obtenir_profe">...</p>
                <h3 class="text-2xl my-4">Llista</h3>
