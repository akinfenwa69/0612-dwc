<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/styles/globals.css">
    <script src="script.js"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <title>Exercici 4-2</title>
</head>

<body onload="initTheme()" class="p-5">
    <script src="/script.js"></script>

    <div class="card relative rounded-xl p-10 bg-[var(--card)] border border-[var(--border)] grid gap-5">
        <span onclick="window.location.href='/'" id="theme-icon"
            class="material-symbols-outlined absolute left-5 top-5 p-3 hover:bg-[var(--accent)] rounded-full cursor-pointer">
            chevron_left
        </span>

        <div class="card-header grid text-center gap-3">
            <h1 class="text-5xl">Objectes JSON</h1>
            <p class="text-[var(--muted-foreground)]">Creació i visualització d'objectes</p>
        </div>

        <div class="card-content grid gap-3">
            <main id="main" class="flex flex-wrap gap-3 justify-center"></main>
        </div>

        <div class="card-footer grid gap-3"></div>
    </div>
</body>

</html>
