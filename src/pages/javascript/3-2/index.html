<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/styles/globals.css">
    <script src="script.js"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <title>Exercici 3-2</title>
</head>

<body onload="initTheme(); onload()" class="p-5">
    <script src="/script.js"></script>

    <div class="card relative rounded-xl p-10 bg-[var(--card)] border border-[var(--border)] grid gap-5">
        <span onclick="window.location.href='/'" id="theme-icon"
            class="material-symbols-outlined absolute left-5 top-5 p-3 hover:bg-[var(--accent)] rounded-full cursor-pointer">
            chevron_left
        </span>

        <div class="card-header grid text-center gap-3">
            <!--Exercici 1: Modifica l’exemple de cookies per tal que es mostri en un títol (h3) el nom introduït per l’usuari en el formulari. -->
            <h1 class="text-5xl" id="title">Cookies Storage</h1>
            <!--Exercici 5: Modifica l’exercici anterior per a que mostri la data i l’hora de l’última visita a la pàgina.-->
            <p class="text-[var(--muted-foreground)]" id="last_visit">Mostrar nom, cognom i canviar color del fons</p>
        </div>
        <div class="card-content grid gap-3">
            <form action="" class="flex flex-col gap-4 mt-5" onsubmit="createCookie()">
                <label for="name">Nom:</label>
                <input placeholder="" type="text" id="name" name="name"
                    class="p-2 rounded border border-gray-500 focus:border-[var(--foreground)] outline-none">

                <!-- Exercici 3: Modifica l’exercici anterior per a que el formulari també demani el cognom, el guardi en una cookie i es mostri el nom i el cognom. -->
                <label for="surname">Cognom:</label>
                <input placeholder="" type="text" id="surname" name="surname"
                    class="p-2 rounded border border-gray-500 focus:border-[var(--foreground)] outline-none">

                <!--Exercici 4: Modifica l’exercici anterior per a que l’usuari pugui escollir el color de fons en que vol veure la pàgina. (Pot posar un link per color, 3 o 4 és suficient). Llavors caldrà que es vegi el color seleccionat en re-carregar la pàgina web.-->
                <label for="bg-color">Color de fons:</label>
                <select title="bg-color" name="bg-color" id="bg_color"
                    class="p-2 rounded border border-gray-500 focus:border-[var(--foreground)] cursor-pointer">
                    <option value="#DBEAFE">Blau</option>
                    <option value="#ECFCCA">Verd</option>
                    <option value="#FFE2E2">Vermell</option>
                    <option value="#FEF9C2">Groc</option>
                </select>

                <button type="submit" class="bg-[var(--accent)]/70 p-3 text-lg cursor-pointer rounded-xl hover:bg-[var(--accent)]">Enviar</button>
            </form>
        </div>
        <div class="card-footer grid gap-3">

        </div>
    </div>
</body>

</html>
