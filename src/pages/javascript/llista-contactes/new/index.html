<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/styles/globals.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <title>Afegir Contacte</title>
</head>

<body onload="checkStorage(); initTheme()" class="bg-[var(--background)] text-[var(--foreground)] flex">
    <script src="/script.js"></script>

    <nav class="h-screen w-80 bg-[var(--sidebar)] text-[var(--sidebar-foreground)] flex flex-col justify-between p-2">
        <div class="grid gap-3">
            <a href="/projectes"
                class="relative transition bg-[var(--sidebar-accent)] hover:bg-[var(--primary)]/20 py-3 px-5 cursor-pointer rounded-lg flex gap-2 items-center">
                <svg aria-label="Vercel Logo" fill="var(--foreground)" viewBox="0 0 75 65" height="48" width="48"
                    class="bg-[var(--background)] border border-[var(--border)] p-3 rounded-lg">
                    <path d="M37.59.25l36.95 64H.64l36.95-64z"></path>
                </svg>
                <div>
                    <p>Projectes</p>
                    <p class="text-xs">Host Vercel</p>
                </div>
                <span class="material-symbols-outlined absolute right-4">unfold_more</span>
            </a>
            <div class="p-2 grid gap-2">
                <p class="text-sm text-[var(--sidebar-foreground)]/50">General</p>
                <ul>
                    <li class="relative flex items-center">
                        <a href="/projectes/1"
                            class="w-full flex gap-2 cursor-pointer items-center transition hover:bg-[var(--sidebar-accent)] p-2 rounded">
                            <span class="material-symbols-outlined">account_box</span>
                            <p>Contactes</p>
                        </a>
                        <a href="/projectes/1/new"
                            class="absolute right-2 flex items-center justify-center rounded-full">
                            <span onclick="window.location.href='/new'"
                                class="material-symbols-outlined hover:bg-[var(--sidebar-foreground)]/20 rounded-full p-0.5">
                                add
                            </span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
        <div class="grid gap-3">
            <div class="p-2 grid gap-2">
                <p class="text-sm text-[var(--sidebar-foreground)]/50">Configuració</p>
                <ul>
                    <li onclick="toggleTheme()"
                        class="flex gap-2 cursor-pointer items-center transition hover:bg-[var(--sidebar-accent)] p-2 rounded select-none">
                        <span id="theme-icon" class="material-symbols-outlined">bedtime</span>
                        <p id="theme-text">Dark Mode</p>
                    </li>
                </ul>
            </div>
            <div
                class="relative transition bg-[var(--sidebar-accent)] hover:bg-[var(--primary)]/20 cursor-pointer py-3 px-5 rounded-lg flex gap-2 items-center">
                <div class="h-8 w-8 flex items-center justify-center">
                    <img src="/images/vib-logo.png" alt="logo">
                </div>
                <p>Pol Poblet Pallisé</p>
            </div>
        </div>
    </nav>

    <main class="flex flex-1 flex-col gap-4 p-4">
        <div class="flex gap-3 items-center h-8">
            <div class="flex items-center">
                <a href="/projecte/1"
                    class="text-[var(--muted-foreground)] transition hover:text-[var(--foreground)]">Home</a>
                <span class="material-symbols-outlined text-[var(--muted-foreground)]">chevron_right</span>
                <p class="text-[var(--foreground)]">Afegir</p>
            </div>
        </div>
        <div class="p-10 grid gap-5 bg-[var(--card)] rounded-xl border border-[var(--primary)]/20">
            <div class="flex flex-col gap-2 items-center justify-center">
                <h1 class="text-2xl">Afegir Contacte</h1>
                <p class="text-[var(--muted-foreground)]">Afegeix un conacte temporal a la llista.</p>
            </div>

            <div>
                <form action="/projecte/1" onsubmit="addContacte()" class="grid grid-cols-2 gap-5">
                    <div class="grid">
                        <label for="name">Nom</label>
                        <input type="text" name="name" id="name"
                            class="border rounded p-2 transition border-[var(--input)] focus:border-[var(--primary)] focus:outline-none">
                    </div>

                    <div class="grid">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email"
                            class="border rounded p-2 transition border-[var(--input)] focus:border-[var(--primary)] focus:outline-none">
                    </div>

                    <div class="grid">
                        <label for="tel">Telèfon</label>
                        <input type="tel" name="tel" id="tel"
                            class="border rounded p-2 transition border-[var(--input)] focus:border-[var(--primary)] focus:outline-none">
                    </div>

                    <button type="submit"
                        class="rounded p-2 cursor-pointer bg-[var(--secondary)] transition border border-[var(--input)] hover:bg-[var(--input)] row-start-3 col-span-2">Enviar</button>
                </form>
                <script src="../script.js"></script>
            </div>

            <div></div>
        </div>
    </main>
</body>

</html>
